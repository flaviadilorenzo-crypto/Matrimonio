<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flavia & Marco</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(#e8f9ff,#f3fbff);
color:#0b2233;
}

.page{
opacity:0;
transition:1s;
}

.page.show{
opacity:1;
}

h1{
font-family:"Playfair Display";
font-size:48px;
margin:10px 0;
}

h2{
font-family:"Playfair Display";
}

.container{
max-width:900px;
margin:auto;
padding:20px;
text-align:center;
}

.cover{
height:320px;
border-radius:20px;
background:url("copertina.png.PNG") center/cover;
margin:20px 0;
}

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.gallery div{
height:200px;
border-radius:15px;
background-size:cover;
background-position:center;
}

.f1{background-image:url("foto1.png.PNG")}
.f2{background-image:url("foto2.png.PNG")}
.f3{background-image:url("foto3.png.PNG")}

.countdown{
display:flex;
justify-content:center;
gap:20px;
margin:20px;
}

.box{
background:white;
padding:10px 15px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
background:#0b4d66;
color:white;
border:none;
padding:12px 20px;
border-radius:30px;
font-size:16px;
cursor:pointer;
}

/* ENVELOPE */

.gate{
position:fixed;
inset:0;
background:#e8f9ff;
display:flex;
align-items:center;
justify-content:center;
}

.envelope{
width:320px;
height:200px;
position:relative;
cursor:pointer;
}

.flap{
position:absolute;
width:100%;
height:100%;
background:#9ed8e6;
clip-path:polygon(0 0,100% 0,50% 50%);
transform-origin:top;
transition:1s;
}

.bodyenv{
position:absolute;
bottom:0;
width:100%;
height:120px;
background:#9ed8e6;
}

.seal{
position:absolute;
top:70px;
left:50%;
transform:translateX(-50%);
width:60px;
height:60px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-family:"Playfair Display";
font-weight:bold;
}

.open .flap{
transform:rotateX(180deg);
}

</style>
</head>

<body>

<!-- BUSTA -->
<div class="gate" id="gate">
<div class="envelope" id="env">
<div class="flap"></div>
<div class="bodyenv"></div>
<div class="seal">F&M</div>
</div>
</div>

<div class="page" id="page">

<div class="container">

<h1>Flavia & Marco</h1>
<p>3 Ottobre 2026</p>

<div class="countdown">
<div class="box"><span id="days"></span><br>giorni</div>
<div class="box"><span id="hours"></span><br>ore</div>
<div class="box"><span id="mins"></span><br>min</div>
</div>

<div class="cover"></div>

<h2>La giornata</h2>

<p><b>11:30</b> Rito</p>
<p><b>13:00</b> Ricevimento</p>
<p>Capo Santa Fortunata Realais</p>

<br>

<button onclick="window.open('https://share.google/bfNfPmuKu6Wmv7A2D')">
Apri la mappa
</button>

<h2 style="margin-top:50px">Le nostre foto</h2>

<div class="gallery">
<div class="f1"></div>
<div class="f2"></div>
<div class="f3"></div>
</div>

</div>

</div>

<script>

const env=document.getElementById("env")
const gate=document.getElementById("gate")
const page=document.getElementById("page")

env.onclick=()=>{
env.classList.add("open")

setTimeout(()=>{
gate.style.display="none"
page.classList.add("show")
},900)
}

const target=new Date("2026-10-03T11:30:00")

function update(){

const now=new Date()

const diff=target-now

const days=Math.floor(diff/(1000*60*60*24))
const hours=Math.floor(diff/(1000*60*60)%24)
const mins=Math.floor(diff/(1000*60)%60)

document.getElementById("days").innerHTML=days
document.getElementById("hours").innerHTML=hours
document.getElementById("mins").innerHTML=mins

}

update()

setInterval(update,1000)

</script>

</body>
</html>
